pipeline:
  name: java_project
  identifier: java_project
  projectIdentifier: agents
  orgIdentifier: default
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: github_tony
        repoName: java_project
        build: <+input>
  stages:
    - stage:
        name: build
        identifier: build
        description: ""
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: true
            override: false
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: account.test
              namespace: default
              automountServiceAccountToken: true
              nodeSelector: {}
              os: Linux
          execution:
            steps:
              - step:
                  type: Run
                  name: prerqs-test
                  identifier: prerqstest
                  spec:
                    connectorRef: docker_vamsiharikanth
                    image: ubuntu:latest
                    shell: Sh
                    command: echo "test"
