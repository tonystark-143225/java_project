pipeline:
  name: java_project
  identifier: java_project
  projectIdentifier: agents
  orgIdentifier: default
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: github_tony
        repoName: java_project
        build: <+input>
  stages:
    - stage:
        name: build
        identifier: build
        description: ""
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: true
            override: false
          execution:
            steps:
              - step:
                  type: Run
                  name: prerqs-test
                  identifier: prerqstest
                  spec:
                    connectorRef: docker_vamsiharikanth
                    image: eclipse-temurin:11-jre-ubi9-minimal
                    shell: Sh
                    command: |-
                      pwd
                      ls
                      #cd d:\java_project
                      mvn clean package
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Docker
            spec:
              harnessImageConnectorRef: docker_vamsiharikanth
  notificationRules:
    - name: ai_selfheal
      identifier: ai_selfheal
      pipelineEvents:
        - type: PipelineFailed
      notificationMethod:
        type: Webhook
        spec:
          webhookUrl: https://app.harness.io/gateway/pipeline/api/webhook/custom/DFKUW4enQ7-pLZoNv35xQw/v3?accountIdentifier=CvYTxb5IRXasJVAqLJDonA&orgIdentifier=default&projectIdentifier=agents&pipelineIdentifier=self_heal_solution&triggerIdentifier=ai_heal
          headers:
            name: vamsi
      enabled: true
