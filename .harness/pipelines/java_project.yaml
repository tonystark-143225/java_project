pipeline:
  name: java_project
  identifier: java_project
  projectIdentifier: agents
  orgIdentifier: default
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: github_tony
        repoName: java_project
        build: <+input>
  stages:
    - stage:
        name: build
        identifier: build
        description: ""
        type: CI
        spec:
          cloneCodebase: tr...
          steps:
            - step:
                name: rerun_demo
                identifier: rerun_demo
                spec:
                  shell: Sh
                  command: "set -e; curl --max-time 5 http://10.255.255.1/vamsi"
                  # Removed 'set -e;' to prevent pipeline failure on curl timeout
                  command: "curl --max-time 5 http://10.255.255.1/vamsi"
