pipeline:
  name: java_project
  identifier: java_project
  projectIdentifier: agents
  orgIdentifier: default
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: github_tony
        repoName: java_project
        build: <+input>
  stages:
    - stage:
        name: build
        identifier: build
        description: ""
        type: CI
        spec:
          cloneCodebase: true
          steps:
            - step:
                name: explore_artifact_war_jar
                identifier: explore_artifact_war_jar
                type: Run
                spec:
                  shell: Sh
                  command: "set -e; ls"
            # Removed 'exit 1' from command
            - step:
                name: prerqstest
                identifier: prerqstest
                type: Run
                spec:
                  shell: Sh
                  command: "echo 'Prerequisite test'"
            - step:
                name: secret_demo
                identifier: secret_demo
                type: Run
                spec:
                  shell: Sh
                  command: "echo \"DB URL is: <+secrets.getValue(\"DATABASE_URL\")>\""
                  when:
                    stageStatus: Success
                    condition: "false"
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Docker
            spec:
              image: maven:3.8.1-jdk-8
              entrypoint: ["/bin/sh", "-c"]
              args: ["echo 'Build complete'"]
